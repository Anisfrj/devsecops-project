apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: devsecops-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
        - name: n8n
          image: n8nio/n8n:1.121.0
          ports:
            - containerPort: 5678
    env:
      - name: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - name: N8N_BASIC_AUTH_USER
        value: "admin"
      - name: N8N_BASIC_AUTH_PASSWORD
        value: "changeme"

      # URL officielle de n8n (celle de ngrok, en HTTPS)
      - name: N8N_HOST
        value: "https://chaliced-nonextensively-allegra.ngrok-free.dev"   # ← remplace par ton host exact
      - name: N8N_PORT
        value: "443"
      - name: N8N_PROTOCOL
        value: "https"

      # Webhook URL complète en HTTPS (optionnel mais propre)
      - name: WEBHOOK_URL
        value: "https://chaliced-nonextensively-allegra.ngrok-free.dev"
